name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Action"
          
          # Use a dedicated deployment branch to extract the backend folder
          git checkout -b deploy-branch
          
          # Cleanly extract the 'backend/' subdirectory to the root of the branch
          # Using 'git subtree split' is more modern and reliable than filter-branch
          git subtree split --prefix=backend -b hf-deploy
          git checkout hf-deploy
          
          # Push to Hugging Face Space using a credential helper for reliable token auth
          # This avoids the "password authentication deprecated" error
          git remote add hf https://huggingface.co/spaces/prana-v12/truthguard-api
          git config --global credential.https://huggingface.co.helper ""
          git config --global credential.https://huggingface.co.helper "!f() { echo \"username=hf\"; echo \"password=$HF_TOKEN\"; }; f"
          
          git push hf hf-deploy:main --force
