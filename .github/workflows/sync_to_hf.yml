      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN is not set. Add it in GitHub repo settings: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          git config --global user.email "deploy@github.com"
          git config --global user.name "GitHub Action"

          git subtree split --prefix=backend -b hf-deploy
          git checkout hf-deploy

          # Push using token auth (avoid password auth deprecation)
          git remote remove hf 2>/dev/null || true
          git remote add hf "https://hf:${HF_TOKEN}@huggingface.co/spaces/prana-v12/truthguard-api"

          git push hf HEAD:main --force
